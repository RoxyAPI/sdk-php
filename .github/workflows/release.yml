name: Release

on:
  repository_dispatch:
    types: [openapi-updated]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'patch | minor | major'
        required: false
        default: 'patch'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - run: composer install --prefer-dist --no-interaction

      - name: Regenerate from live OpenAPI
        run: node scripts/generate.mjs

      - name: Sync docs from spec
        run: node scripts/sync-docs.mjs

      - name: Check if spec changed
        id: diff
        run: |
          OLD=$(git show HEAD:specs/openapi.json | jq -cS '{paths, components}')
          NEW=$(jq -cS '{paths, components}' specs/openapi.json)
          if [ "$OLD" = "$NEW" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Lint
        if: steps.diff.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: vendor/bin/pint --test

      - name: Static analysis
        if: steps.diff.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Test
        if: steps.diff.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: vendor/bin/pest --no-coverage

      - name: Bump version
        if: steps.diff.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: bump
        run: |
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          npm version "$BUMP" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          # Mirror version into composer.json so packagist sees it on tag.
          node -e "const fs=require('fs');const p=require('./composer.json');p.version='$VERSION';fs.writeFileSync('composer.json',JSON.stringify(p,null,4)+'\n');"
          # Regenerate Version.php from the new package.json version.
          node scripts/generate.mjs
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit, tag, push
        if: steps.diff.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION="${{ steps.bump.outputs.version }}"
          git add composer.json package.json src/Version.php specs/openapi.json src/Roxy.php src/Generated tests/Generated README.md AGENTS.md
          git commit -m "release: v$VERSION"
          git tag "v$VERSION"
          # Protected main requires the ci-ok context green on every pushed SHA, and a direct push can never carry one. So park the commit on a temp branch, run the real CI there via workflow_dispatch (GITHUB_TOKEN pushes trigger no workflows on their own), and push to main only after it reports green.
          SHA=$(git rev-parse HEAD)
          git push --force origin "HEAD:refs/heads/release-checks"
          gh workflow run ci.yml --ref release-checks
          RUN_ID=""
          for _ in $(seq 1 24); do
            sleep 5
            RUN_ID=$(gh run list --workflow=ci.yml --branch=release-checks --limit 5 --json databaseId,headSha --jq "[.[] | select(.headSha == \"$SHA\")][0].databaseId // empty")
            [ -n "$RUN_ID" ] && break
          done
          [ -n "$RUN_ID" ] || { echo "dispatched CI run never appeared for $SHA"; exit 1; }
          gh run watch "$RUN_ID" --exit-status
          git push --follow-tags
          git push origin --delete release-checks || true

      - name: Create GitHub release
        if: steps.diff.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
          make_latest: 'true'

      - name: No changes
        if: steps.diff.outputs.changed == 'false' && github.event_name != 'workflow_dispatch'
        run: echo "OpenAPI spec unchanged. Nothing to release."
